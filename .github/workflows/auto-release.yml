name: Auto Release on Main Changes

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore MaterialManager_V01.csproj

      - name: Build
        run: dotnet build MaterialManager_V01.csproj -c Release --no-restore

      - name: Publish win-x64
        run: dotnet publish MaterialManager_V01.csproj -c Release -r win-x64 --self-contained true -o publish

      - name: Prepare release metadata
        id: meta
        shell: pwsh
        run: |
          [xml]$proj = Get-Content "MaterialManager_V01.csproj"
          $baseVersion = $proj.Project.PropertyGroup.Version
          if ([string]::IsNullOrWhiteSpace($baseVersion)) { $baseVersion = "1.0.0" }
          $tag = "v$baseVersion.$env:GITHUB_RUN_NUMBER"
          $exe = "publish\MaterialManager_V01.exe"
          $zip = "MaterialManager_V01_$tag.zip"
          Compress-Archive -Path "publish\*" -DestinationPath $zip -Force

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "zip=$zip" >> $env:GITHUB_OUTPUT
          "exe=$exe" >> $env:GITHUB_OUTPUT

      - name: Import code-signing certificate
        if: ${{ secrets.CODESIGN_PFX_BASE64 != '' && secrets.CODESIGN_PFX_PASSWORD != '' }}
        shell: pwsh
        run: |
          $pfxPath = "$env:RUNNER_TEMP\codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String("${{ secrets.CODESIGN_PFX_BASE64 }}"))
          "CODESIGN_PFX_PATH=$pfxPath" >> $env:GITHUB_ENV

      - name: Sign executable
        if: ${{ env.CODESIGN_PFX_PATH != '' }}
        shell: pwsh
        run: |
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) { throw "signtool.exe nicht gefunden." }

          & $signtool sign /fd SHA256 /f "$env:CODESIGN_PFX_PATH" /p "${{ secrets.CODESIGN_PFX_PASSWORD }}" /tr "http://timestamp.digicert.com" /td SHA256 "${{ steps.meta.outputs.exe }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Auto Release ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            ${{ steps.meta.outputs.zip }}
            ${{ steps.meta.outputs.exe }}